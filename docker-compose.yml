services:
  # Database Service (Using Cloud Atlas but local container kept for options, mapped to 27019 to avoid conflict)
  # You can comment this out if using Atlas exclusively
  mongodb:
    image: mongo:latest
    container_name: soleontech-mongo
    ports:
      - "27019:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - soleontech-network

  # Backend Service
  server:
    build: ./server
    container_name: soleontech-server
    ports:
      - "5055:5000"
    env_file: ./server/.env
    # Environment variables are loaded from .env file directly
    depends_on:
      - mongodb
    networks:
      - soleontech-network

  # Frontend Service
  client:
    build: 
      context: ./client
      args:
        # Build arg for frontend to know where backend is (relative path /api assumes reverse proxy handling)
        - VITE_API_URL=/api
    container_name: soleontech-client
    ports:
      - "8085:80"
    depends_on:
      - server
    networks:
      - soleontech-network

networks:
  soleontech-network:
    driver: bridge

volumes:
  mongo-data:
