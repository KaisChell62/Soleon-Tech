<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="600" fill="#0b0b0b"/>
  <text x="40" y="40" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ef4444">AVANT — interfaces disparates & images non-professionnelles</text>
  <g transform="translate(40,80)">
    <!-- Grid of thumbnails with inconsistent styles -->
    <g>
      <rect x="0" y="0" width="220" height="140" rx="6" fill="#1f2937"/>
      <text x="12" y="24" font-family="Georgia,serif" font-size="14" fill="#fff">Exposition A</text>
      <rect x="0" y="160" width="220" height="20" fill="#374151"/>
    </g>
    <g transform="translate(240,0)">
      <rect x="0" y="0" width="220" height="140" rx="6" fill="#3b1f1f"/>
      <text x="12" y="24" font-family="Comic Sans MS,cursive" font-size="14" fill="#fff">Show B</text>
    </g>
    <g transform="translate(480,0)">
      <rect x="0" y="0" width="220" height="140" rx="6" fill="#0b1220"/>
      <text x="12" y="24" font-family="Impact,sans-serif" font-size="14" fill="#fff">Event</text>
    </g>
    <g transform="translate(720,0)">
      <rect x="0" y="0" width="220" height="140" rx="6" fill="#072033"/>
      <text x="12" y="24" font-family="Times New Roman,serif" font-size="14" fill="#fff">Artist</text>
    </g>
  </g>
  <text x="40" y="520" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#f97316">Problèmes : images basse résolution, styles incohérents, navigation confuse</text>
</svg>
