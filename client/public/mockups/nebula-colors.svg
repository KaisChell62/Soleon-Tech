<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="nebulaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#D946EF"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#0a0a0f"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#8B5CF6" letter-spacing="4">COLOR SYSTEM</text>
  
  <!-- Main Colors -->
  <text x="70" y="75" font-family="Arial" font-size="11" fill="#666">PRIMARY PALETTE</text>
  
  <!-- Nebula Violet -->
  <rect x="50" y="90" width="120" height="120" rx="8" fill="#8B5CF6"/>
  <text x="110" y="240" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">Nebula Violet</text>
  <text x="110" y="255" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">#8B5CF6</text>
  <text x="110" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">RGB 139, 92, 246</text>
  
  <!-- Cosmic Cyan -->
  <rect x="190" y="90" width="120" height="120" rx="8" fill="#06B6D4"/>
  <text x="250" y="240" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">Cosmic Cyan</text>
  <text x="250" y="255" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">#06B6D4</text>
  <text x="250" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">RGB 6, 182, 212</text>
  
  <!-- Aurora Fuchsia -->
  <rect x="330" y="90" width="120" height="120" rx="8" fill="#D946EF"/>
  <text x="390" y="240" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">Aurora Fuchsia</text>
  <text x="390" y="255" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">#D946EF</text>
  <text x="390" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">RGB 217, 70, 239</text>
  
  <!-- Void Black -->
  <rect x="470" y="90" width="120" height="120" rx="8" fill="#0A0A0F" stroke="#333" stroke-width="1"/>
  <text x="530" y="240" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">Void Black</text>
  <text x="530" y="255" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">#0A0A0F</text>
  <text x="530" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">RGB 10, 10, 15</text>
  
  <!-- Stellar White -->
  <rect x="610" y="90" width="120" height="120" rx="8" fill="#F8FAFC"/>
  <text x="670" y="240" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">Stellar White</text>
  <text x="670" y="255" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">#F8FAFC</text>
  <text x="670" y="270" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">RGB 248, 250, 252</text>
  
  <!-- Gradients Section -->
  <text x="70" y="310" font-family="Arial" font-size="11" fill="#666">GRADIENTS</text>
  
  <rect x="50" y="325" width="220" height="60" rx="8" fill="url(#nebulaGrad)"/>
  <text x="160" y="405" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Primary Gradient • 0° → 100%</text>
  
  <rect x="290" y="325" width="220" height="60" rx="8" fill="url(#pinkGrad)"/>
  <text x="400" y="405" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">Accent Gradient • Tri-color</text>
  
  <!-- Tints -->
  <text x="545" y="310" font-family="Arial" font-size="11" fill="#666">TINTS</text>
  
  <rect x="530" y="325" width="40" height="40" rx="4" fill="#8B5CF6"/>
  <rect x="575" y="325" width="40" height="40" rx="4" fill="#8B5CF6" opacity="0.8"/>
  <rect x="620" y="325" width="40" height="40" rx="4" fill="#8B5CF6" opacity="0.6"/>
  <rect x="665" y="325" width="40" height="40" rx="4" fill="#8B5CF6" opacity="0.4"/>
  <rect x="710" y="325" width="40" height="40" rx="4" fill="#8B5CF6" opacity="0.2"/>
  
  <text x="550" y="380" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">100%</text>
  <text x="595" y="380" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">80%</text>
  <text x="640" y="380" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">60%</text>
  <text x="685" y="380" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">40%</text>
  <text x="730" y="380" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">20%</text>
  
  <!-- Usage examples -->
  <text x="70" y="440" font-family="Arial" font-size="11" fill="#666">USAGE</text>
  
  <rect x="50" y="455" width="100" height="30" rx="15" fill="url(#nebulaGrad)"/>
  <text x="100" y="475" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">Button</text>
  
  <rect x="170" y="455" width="100" height="30" rx="4" fill="none" stroke="#8B5CF6" stroke-width="2"/>
  <text x="220" y="475" text-anchor="middle" font-family="Arial" font-size="11" fill="#8B5CF6">Outline</text>
  
  <rect x="290" y="455" width="150" height="30" rx="4" fill="#1a1a2e"/>
  <text x="365" y="475" text-anchor="middle" font-family="Arial" font-size="11" fill="#06B6D4">Link Text →</text>
  
  <rect x="460" y="455" width="120" height="30" rx="4" fill="#8B5CF6" opacity="0.1"/>
  <text x="520" y="475" text-anchor="middle" font-family="Arial" font-size="11" fill="#8B5CF6">Tag Label</text>
  
  <!-- Footer -->
  <text x="700" y="475" font-family="Arial" font-size="9" fill="#444">Nebula AI • Brand Guidelines v1.0</text>
</svg>