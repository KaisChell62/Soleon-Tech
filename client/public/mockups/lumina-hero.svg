<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="600" fill="#05060a"/>
  <defs>
    <linearGradient id="g1" x1="0" x2="1"><stop offset="0%" stop-color="#ffb347"/><stop offset="100%" stop-color="#ff5e62"/></linearGradient>
  </defs>
  <g transform="translate(60,50)">
    <text x="0" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">LUMINA GALLERY</text>
    <text x="0" y="72" font-family="Inter, system-ui, sans-serif" font-size="42" fill="#fff" font-weight="700">Brand identity & immersive experience</text>
    <rect x="0" y="110" width="420" height="260" rx="12" fill="url(#g1)" opacity="0.12"/>
    <g transform="translate(20,130)">
      <rect x="0" y="0" width="160" height="120" rx="8" fill="#0f172a" stroke="#1f2937"/>
      <rect x="180" y="0" width="160" height="120" rx="8" fill="#0b1220" stroke="#1f2937"/>
      <rect x="360" y="0" width="160" height="120" rx="8" fill="#071026" stroke="#1f2937"/>
      <text x="0" y="150" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#cbd5e1">Immersive frames adapt to artwork color</text>
    </g>

    <g transform="translate(520,110)">
      <rect x="0" y="0" width="620" height="260" rx="12" fill="#071027" stroke="#111827"/>
      <text x="24" y="36" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#cbd5e1">Virtual room preview</text>
      <circle cx="120" cy="130" r="64" fill="#ff7a59" opacity="0.95"/>
      <rect x="220" y="90" width="260" height="120" rx="8" fill="#0b1220"/>
      <text x="260" y="150" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Liquid frame — adapts to hue</text>
    </g>
  </g>
</svg>
