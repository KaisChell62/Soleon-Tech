<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="ga" x1="0" x2="1">
      <stop offset="0%" stop-color="#ecfccb" />
      <stop offset="100%" stop-color="#bbf7d0" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#ga)" />
  <text x="60" y="72" font-family="Inter, Arial" font-size="34" font-weight="700" fill="#064e3b">Après — UI refondue (premium)</text>
  <g transform="translate(60,120)">
    <rect width="1080" height="620" rx="20" fill="#ffffff" />

    <!-- Left: large hero product photo to show improved imagery -->
    <g transform="translate(36,32)">
      <text x="0" y="0" font-size="18" fill="#0f172a">Produit en avant</text>
      <image href="/mockups/eco-market-hero.svg" x="0" y="28" width="520" height="400" preserveAspectRatio="xMidYMid slice" />
      <text x="0" y="444" font-size="16" fill="#0f172a">Large visuel net, espace respirant.</text>
      <rect x="0" y="468" width="220" height="56" rx="28" fill="#10b981" />
      <text x="24" y="506" font-size="16" fill="#fff">Ajouter au panier</text>
    </g>

    <!-- Right: clear CTA and product info -->
    <g transform="translate(580,32)">
      <text x="0" y="0" font-size="18" fill="#064e3b">Prix & CTA</text>
      <rect x="0" y="28" width="420" height="280" rx="12" fill="#ffffff" stroke="#eef2f7" />
      <text x="24" y="112" font-size="28" fill="#0f172a">€ 4.99</text>
      <rect x="24" y="140" width="160" height="44" rx="10" fill="#10b981" />
      <text x="56" y="172" font-size="14" fill="#ffffff">Ajouter</text>
      <text x="24" y="220" font-size="14" fill="#64748b">Description courte et bénéfices.</text>
      <g transform="translate(0,260)">
        <rect x="0" y="0" width="120" height="100" rx="12" fill="#fff" stroke="#eef6f1" />
        <rect x="140" y="0" width="120" height="100" rx="12" fill="#fff" stroke="#fff1f0" />
        <rect x="280" y="0" width="120" height="100" rx="12" fill="#fff" stroke="#eef2ff" />
      </g>
    </g>
  </g>
</svg>
