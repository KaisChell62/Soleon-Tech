<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="nebulaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#0a0a0f"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a2e" stroke-width="1"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#8B5CF6">BRAND APPLICATIONS</text>
  
  <!-- Business Card Front -->
  <rect x="50" y="70" width="200" height="120" rx="8" fill="url(#cardGrad)" stroke="#8B5CF6" stroke-width="1"/>
  <circle cx="100" cy="130" r="25" fill="url(#nebulaGrad)"/>
  <circle cx="100" cy="130" r="18" fill="#0f0f1a"/>
  <text x="100" y="137" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="url(#nebulaGrad)">N</text>
  <text x="160" y="120" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">Nebula</text>
  <text x="160" y="138" font-family="Arial" font-size="10" fill="#8B5CF6">AI Solutions</text>
  <text x="80" y="205" font-family="Arial" font-size="9" fill="#666">Carte de visite - Recto</text>
  
  <!-- Business Card Back -->
  <rect x="280" y="70" width="200" height="120" rx="8" fill="url(#nebulaGrad)"/>
  <circle cx="380" cy="130" r="35" fill="#fff" opacity="0.1"/>
  <circle cx="380" cy="130" r="25" fill="#fff" opacity="0.15"/>
  <text x="380" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">contact@nebula-ai.com</text>
  <text x="380" y="135" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">+33 1 23 45 67 89</text>
  <text x="380" y="155" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">www.nebula-ai.com</text>
  <text x="310" y="205" font-family="Arial" font-size="9" fill="#666">Carte de visite - Verso</text>
  
  <!-- Letterhead -->
  <rect x="510" y="70" width="160" height="200" rx="4" fill="#fff"/>
  <circle cx="545" cy="100" r="15" fill="url(#nebulaGrad)"/>
  <circle cx="545" cy="100" r="10" fill="#fff"/>
  <text x="545" y="105" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#8B5CF6">N</text>
  <text x="570" y="102" font-family="Arial" font-size="10" font-weight="bold" fill="#1a1a2e">Nebula AI</text>
  <rect x="530" y="130" width="120" height="3" rx="1" fill="#eee"/>
  <rect x="530" y="140" width="100" height="3" rx="1" fill="#eee"/>
  <rect x="530" y="150" width="110" height="3" rx="1" fill="#eee"/>
  <rect x="530" y="160" width="80" height="3" rx="1" fill="#eee"/>
  <rect x="530" y="180" width="120" height="3" rx="1" fill="#eee"/>
  <rect x="530" y="190" width="90" height="3" rx="1" fill="#eee"/>
  <rect x="530" y="200" width="100" height="3" rx="1" fill="#eee"/>
  <rect x="530" y="230" width="60" height="8" rx="2" fill="url(#nebulaGrad)" opacity="0.5"/>
  <text x="535" y="285" font-family="Arial" font-size="9" fill="#666">Papier à en-tête</text>
  
  <!-- Envelope -->
  <rect x="50" y="240" width="200" height="130" rx="4" fill="#fff"/>
  <polygon points="50,240 150,310 250,240" fill="none" stroke="#ddd" stroke-width="1"/>
  <circle cx="80" cy="340" r="12" fill="url(#nebulaGrad)"/>
  <circle cx="80" cy="340" r="8" fill="#fff"/>
  <text x="80" y="344" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#8B5CF6">N</text>
  <text x="100" y="343" font-family="Arial" font-size="8" font-weight="bold" fill="#333">Nebula AI</text>
  <text x="80" y="385" font-family="Arial" font-size="9" fill="#666">Enveloppe</text>
  
  <!-- Folder -->
  <rect x="280" y="230" width="180" height="140" rx="4" fill="url(#cardGrad)" stroke="#333" stroke-width="1"/>
  <rect x="280" y="220" width="80" height="20" rx="4" fill="url(#cardGrad)" stroke="#333" stroke-width="1"/>
  <circle cx="370" cy="300" r="30" fill="url(#nebulaGrad)" opacity="0.3"/>
  <circle cx="370" cy="300" r="20" fill="url(#nebulaGrad)" opacity="0.5"/>
  <text x="370" y="307" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#fff">N</text>
  <text x="310" y="385" font-family="Arial" font-size="9" fill="#666">Pochette de présentation</text>
  
  <!-- USB/Merchandise -->
  <rect x="510" y="310" width="80" height="30" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <rect x="590" y="318" width="15" height="14" fill="#666"/>
  <circle cx="540" cy="325" r="8" fill="url(#nebulaGrad)"/>
  <circle cx="540" cy="325" r="5" fill="#1a1a2e"/>
  <text x="540" y="328" text-anchor="middle" font-family="Arial" font-size="6" font-weight="bold" fill="#8B5CF6">N</text>
  <text x="535" y="355" font-family="Arial" font-size="9" fill="#666">Clé USB</text>
  
  <!-- Badge -->
  <rect x="620" y="300" width="60" height="80" rx="4" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <circle cx="650" cy="330" r="15" fill="url(#nebulaGrad)"/>
  <circle cx="650" cy="330" r="10" fill="#fff"/>
  <text x="650" y="334" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#8B5CF6">N</text>
  <rect x="630" y="355" width="40" height="4" rx="1" fill="#ddd"/>
  <rect x="635" y="365" width="30" height="3" rx="1" fill="#eee"/>
  <text x="625" y="395" font-family="Arial" font-size="9" fill="#666">Badge</text>
  
  <!-- Footer -->
  <text x="400" y="470" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Papeterie complète - Identité Nebula AI</text>
</svg>