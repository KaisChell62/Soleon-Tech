<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" stroke-width=".5"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc"/>
  <rect width="800" height="600" fill="url(#grid)" opacity=".4"/>
  <!-- Title -->
  <text x="40" y="45" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1e293b">Urban Pulse — Kiosk Interface Wireframe</text>
  <text x="40" y="62" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">Interactive Touchpoint · V3.2</text>
  <!-- Kiosk frame -->
  <rect x="60" y="85" width="680" height="480" rx="12" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- Top bar -->
  <rect x="60" y="85" width="680" height="48" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="62" y="133" width="676" height="1" fill="#cbd5e1"/>
  <!-- Logo area -->
  <rect x="80" y="97" width="24" height="24" rx="4" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="112" y="113" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#64748b">Urban Pulse</text>
  <!-- Nav items -->
  <rect x="350" y="100" width="60" height="18" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="420" y="100" width="60" height="18" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="490" y="100" width="60" height="18" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Language selector -->
  <rect x="660" y="100" width="60" height="18" rx="4" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="675" y="113" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">FR ▾</text>
  <!-- Hero area -->
  <rect x="80" y="150" width="340" height="160" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="250" y="220" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">[Map / City Visualization]</text>
  <rect x="250" y="235" width="1" height="1" fill="none"/>
  <!-- Map dots -->
  <circle cx="150" cy="200" r="6" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2,2"/>
  <circle cx="220" cy="230" r="6" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2,2"/>
  <circle cx="300" cy="190" r="6" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2,2"/>
  <circle cx="350" cy="250" r="6" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="150" y1="200" x2="220" y2="230" stroke="#cbd5e1" stroke-width=".7" stroke-dasharray="3,3"/>
  <line x1="220" y1="230" x2="300" y2="190" stroke="#cbd5e1" stroke-width=".7" stroke-dasharray="3,3"/>
  <line x1="300" y1="190" x2="350" y2="250" stroke="#cbd5e1" stroke-width=".7" stroke-dasharray="3,3"/>
  <!-- Quick actions -->
  <rect x="440" y="150" width="140" height="75" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="455" y="163" width="24" height="24" rx="6" fill="none" stroke="#94a3b8" stroke-width="1"/><text x="467" y="179" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">🚇</text>
  <rect x="465" y="192" width="80" height="6" rx="3" fill="#e2e8f0"/>
  <rect x="465" y="203" width="50" height="4" rx="2" fill="#f1f5f9" stroke="#e2e8f0" stroke-width=".5"/>
  <text x="455" y="163" font-family="system-ui,sans-serif" font-size="0" fill="none"/>
  <!-- Quick action 2 -->
  <rect x="600" y="150" width="140" height="75" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="615" y="163" width="24" height="24" rx="6" fill="none" stroke="#94a3b8" stroke-width="1"/><text x="627" y="179" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">🌳</text>
  <rect x="625" y="192" width="80" height="6" rx="3" fill="#e2e8f0"/>
  <rect x="625" y="203" width="50" height="4" rx="2" fill="#f1f5f9" stroke="#e2e8f0" stroke-width=".5"/>
  <!-- Quick action 3 -->
  <rect x="440" y="235" width="140" height="75" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="455" y="248" width="24" height="24" rx="6" fill="none" stroke="#94a3b8" stroke-width="1"/><text x="467" y="264" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">📋</text>
  <rect x="465" y="278" width="80" height="6" rx="3" fill="#e2e8f0"/>
  <!-- Quick action 4 -->
  <rect x="600" y="235" width="140" height="75" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="615" y="248" width="24" height="24" rx="6" fill="none" stroke="#94a3b8" stroke-width="1"/><text x="627" y="264" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">💧</text>
  <rect x="625" y="278" width="80" height="6" rx="3" fill="#e2e8f0"/>
  <!-- Stats row -->
  <g transform="translate(80,330)">
    <rect width="200" height="90" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="15" y="15" width="28" height="28" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="55" y="18" width="80" height="8" rx="3" fill="#e2e8f0"/>
    <rect x="55" y="32" width="50" height="6" rx="3" fill="#f1f5f9"/>
    <!-- Mini bar chart placeholder -->
    <rect x="15" y="55" width="15" height="20" rx="2" fill="#e2e8f0"/><rect x="35" y="60" width="15" height="15" rx="2" fill="#e2e8f0"/>
    <rect x="55" y="50" width="15" height="25" rx="2" fill="#e2e8f0"/><rect x="75" y="55" width="15" height="20" rx="2" fill="#e2e8f0"/>
    <rect x="95" y="45" width="15" height="30" rx="2" fill="#e2e8f0"/><rect x="115" y="52" width="15" height="23" rx="2" fill="#e2e8f0"/>
  </g>
  <g transform="translate(300,330)">
    <rect width="200" height="90" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="15" y="15" width="28" height="28" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="55" y="18" width="80" height="8" rx="3" fill="#e2e8f0"/>
    <rect x="55" y="32" width="50" height="6" rx="3" fill="#f1f5f9"/>
    <!-- Progress bar -->
    <rect x="15" y="60" width="170" height="8" rx="4" fill="#f1f5f9"/><rect x="15" y="60" width="120" height="8" rx="4" fill="#e2e8f0"/>
  </g>
  <g transform="translate(520,330)">
    <rect width="200" height="90" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="15" y="15" width="28" height="28" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="55" y="18" width="80" height="8" rx="3" fill="#e2e8f0"/>
    <rect x="55" y="32" width="50" height="6" rx="3" fill="#f1f5f9"/>
    <!-- Donut placeholder -->
    <circle cx="50" cy="68" r="12" fill="none" stroke="#e2e8f0" stroke-width="4"/><path d="M 50 56 A 12 12 0 1 1 38 68" fill="none" stroke="#cbd5e1" stroke-width="4"/>
  </g>
  <!-- Bottom nav -->
  <rect x="80" y="440" width="660" height="50" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="110" y="455" width="80" height="22" rx="6" fill="#e2e8f0"/><rect x="220" y="455" width="80" height="22" rx="6" fill="#e2e8f0"/>
  <rect x="330" y="455" width="80" height="22" rx="6" fill="#e2e8f0"/><rect x="440" y="455" width="80" height="22" rx="6" fill="#e2e8f0"/>
  <rect x="550" y="455" width="80" height="22" rx="6" fill="#e2e8f0"/>
  <!-- Accessibility badge -->
  <rect x="80" y="510" width="120" height="28" rx="14" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="105" y="528" font-family="system-ui,sans-serif" font-size="9" fill="#10b981" font-weight="600">♿ WCAG AAA</text>
  <!-- Annotations -->
  <g fill="none" stroke="#6366f1" stroke-width="1" opacity=".6">
    <line x1="25" y1="85" x2="25" y2="565" stroke-dasharray="3,3"/>
    <line x1="775" y1="85" x2="775" y2="565" stroke-dasharray="3,3"/>
    <text x="25" y="575" font-family="system-ui,sans-serif" font-size="8" fill="#6366f1" text-anchor="middle">40px</text>
    <text x="775" y="575" font-family="system-ui,sans-serif" font-size="8" fill="#6366f1" text-anchor="middle">40px</text>
  </g>
  <!-- Redline annotation -->
  <line x1="80" y1="500" x2="740" y2="500" stroke="#ef4444" stroke-width=".5" stroke-dasharray="2,2" opacity=".4"/>
  <text x="410" y="498" font-family="monospace" font-size="7" fill="#ef4444" text-anchor="middle" opacity=".5">680px — touch-optimized layout</text>
</svg>
