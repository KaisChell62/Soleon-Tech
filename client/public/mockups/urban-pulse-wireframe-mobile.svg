<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <pattern id="grid2" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" stroke-width=".5"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc"/>
  <rect width="800" height="600" fill="url(#grid2)" opacity=".3"/>
  <!-- Title -->
  <text x="40" y="45" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1e293b">Urban Pulse — Citizen App Wireframe</text>
  <text x="40" y="62" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">iOS &amp; Android · V4.1 · 3 screens</text>

  <!-- Screen 1: Home -->
  <g transform="translate(40,90)">
    <text x="80" y="-8" font-family="system-ui,sans-serif" font-size="9" fill="#6366f1" font-weight="600" text-anchor="middle">HOME</text>
    <!-- Phone frame -->
    <rect width="160" height="320" rx="16" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="50" y="6" width="60" height="8" rx="4" fill="#e2e8f0"/>
    <!-- Status bar -->
    <rect x="10" y="22" width="140" height="1" fill="#f1f5f9"/>
    <!-- Welcome -->
    <rect x="15" y="32" width="90" height="8" rx="3" fill="#334155"/>
    <rect x="15" y="46" width="60" height="5" rx="2" fill="#e2e8f0"/>
    <!-- Quick actions grid 2x2 -->
    <rect x="15" y="62" width="60" height="50" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="27" y="72" width="16" height="16" rx="4" fill="#e2e8f0"/>
    <rect x="22" y="95" width="46" height="5" rx="2" fill="#e2e8f0"/>
    <rect x="85" y="62" width="60" height="50" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="97" y="72" width="16" height="16" rx="4" fill="#e2e8f0"/>
    <rect x="92" y="95" width="46" height="5" rx="2" fill="#e2e8f0"/>
    <rect x="15" y="120" width="60" height="50" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="27" y="130" width="16" height="16" rx="4" fill="#e2e8f0"/>
    <rect x="22" y="153" width="46" height="5" rx="2" fill="#e2e8f0"/>
    <rect x="85" y="120" width="60" height="50" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="97" y="130" width="16" height="16" rx="4" fill="#e2e8f0"/>
    <rect x="92" y="153" width="46" height="5" rx="2" fill="#e2e8f0"/>
    <!-- Alerts -->
    <rect x="15" y="182" width="130" height="5" rx="2" fill="#334155"/>
    <rect x="15" y="196" width="130" height="35" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width=".5"/>
    <rect x="25" y="206" width="10" height="10" rx="2" fill="#f59e0b" opacity=".3"/>
    <rect x="42" y="206" width="70" height="5" rx="2" fill="#92400e" opacity=".2"/>
    <rect x="42" y="216" width="50" height="4" rx="2" fill="#92400e" opacity=".1"/>
    <!-- Card -->
    <rect x="15" y="240" width="130" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="25" y="250" width="80" height="6" rx="2" fill="#e2e8f0"/>
    <rect x="25" y="262" width="50" height="4" rx="2" fill="#f1f5f9"/>
    <!-- Bottom nav -->
    <rect x="0" y="290" width="160" height="30" rx="0" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="32" cy="305" r="4" fill="#e2e8f0"/><circle cx="64" cy="305" r="4" fill="#94a3b8"/>
    <circle cx="96" cy="305" r="4" fill="#e2e8f0"/><circle cx="128" cy="305" r="4" fill="#e2e8f0"/>
  </g>

  <!-- Screen 2: Transport -->
  <g transform="translate(260,90)">
    <text x="80" y="-8" font-family="system-ui,sans-serif" font-size="9" fill="#6366f1" font-weight="600" text-anchor="middle">TRANSPORT</text>
    <rect width="160" height="320" rx="16" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="50" y="6" width="60" height="8" rx="4" fill="#e2e8f0"/>
    <!-- Header -->
    <rect x="10" y="24" width="14" height="14" rx="3" fill="none" stroke="#94a3b8" stroke-width="1"/>
    <rect x="30" y="26" width="60" height="7" rx="3" fill="#334155"/>
    <!-- Search -->
    <rect x="15" y="48" width="130" height="26" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="25" y="57" width="60" height="5" rx="2" fill="#e2e8f0"/>
    <!-- Map area -->
    <rect x="15" y="84" width="130" height="80" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="80" y="128" font-family="system-ui,sans-serif" font-size="8" fill="#86efac" text-anchor="middle">[Mini Map]</text>
    <!-- Lines -->
    <line x1="40" y1="100" x2="120" y2="100" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"/>
    <circle cx="50" cy="100" r="3" fill="#94a3b8"/><circle cx="80" cy="100" r="3" fill="#94a3b8"/><circle cx="110" cy="100" r="3" fill="#94a3b8"/>
    <line x1="30" y1="120" x2="140" y2="120" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"/>
    <circle cx="45" cy="120" r="3" fill="#94a3b8"/><circle cx="90" cy="120" r="3" fill="#94a3b8"/><circle cx="130" cy="120" r="3" fill="#94a3b8"/>
    <!-- Transit cards -->
    <rect x="15" y="174" width="130" height="38" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="22" y="182" width="8" height="8" rx="4" fill="#06b6d4" opacity=".4"/>
    <rect x="36" y="182" width="60" height="6" rx="2" fill="#e2e8f0"/>
    <rect x="36" y="193" width="40" height="4" rx="2" fill="#f1f5f9"/>
    <rect x="105" y="182" width="30" height="14" rx="4" fill="#dcfce7"/><text x="120" y="192" font-family="system-ui,sans-serif" font-size="6" fill="#16a34a" text-anchor="middle">OK</text>
    <rect x="15" y="218" width="130" height="38" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="22" y="226" width="8" height="8" rx="4" fill="#6366f1" opacity=".4"/>
    <rect x="36" y="226" width="60" height="6" rx="2" fill="#e2e8f0"/>
    <rect x="36" y="237" width="40" height="4" rx="2" fill="#f1f5f9"/>
    <rect x="105" y="226" width="30" height="14" rx="4" fill="#fef3c7"/><text x="120" y="236" font-family="system-ui,sans-serif" font-size="6" fill="#d97706" text-anchor="middle">2m</text>
    <!-- Bottom nav -->
    <rect x="0" y="290" width="160" height="30" rx="0" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="32" cy="305" r="4" fill="#e2e8f0"/><circle cx="64" cy="305" r="4" fill="#e2e8f0"/>
    <circle cx="96" cy="305" r="4" fill="#94a3b8"/><circle cx="128" cy="305" r="4" fill="#e2e8f0"/>
  </g>

  <!-- Screen 3: Services -->
  <g transform="translate(480,90)">
    <text x="80" y="-8" font-family="system-ui,sans-serif" font-size="9" fill="#6366f1" font-weight="600" text-anchor="middle">SERVICES</text>
    <rect width="160" height="320" rx="16" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="50" y="6" width="60" height="8" rx="4" fill="#e2e8f0"/>
    <!-- Header -->
    <rect x="10" y="24" width="14" height="14" rx="3" fill="none" stroke="#94a3b8" stroke-width="1"/>
    <rect x="30" y="26" width="60" height="7" rx="3" fill="#334155"/>
    <!-- Categories -->
    <rect x="15" y="48" width="45" height="20" rx="10" fill="#ede9fe" stroke="#c4b5fd" stroke-width=".5"/>
    <rect x="23" y="55" width="30" height="5" rx="2" fill="#8b5cf6" opacity=".3"/>
    <rect x="66" y="48" width="45" height="20" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width=".5"/>
    <rect x="74" y="55" width="30" height="5" rx="2" fill="#e2e8f0"/>
    <rect x="117" y="48" width="30" height="20" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width=".5"/>
    <rect x="122" y="55" width="20" height="5" rx="2" fill="#e2e8f0"/>
    <!-- Service list items -->
    <g transform="translate(15,78)">
      <rect width="130" height="45" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="10" y="10" width="24" height="24" rx="6" fill="#f0f9ff" stroke="#bae6fd" stroke-width=".5"/>
      <rect x="42" y="12" width="70" height="6" rx="2" fill="#e2e8f0"/>
      <rect x="42" y="24" width="45" height="4" rx="2" fill="#f1f5f9"/>
      <rect x="110" y="16" width="12" height="12" rx="2" fill="none" stroke="#d1d5db" stroke-width="1"/>
    </g>
    <g transform="translate(15,130)">
      <rect width="130" height="45" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="10" y="10" width="24" height="24" rx="6" fill="#fef3c7" stroke="#fde68a" stroke-width=".5"/>
      <rect x="42" y="12" width="70" height="6" rx="2" fill="#e2e8f0"/>
      <rect x="42" y="24" width="45" height="4" rx="2" fill="#f1f5f9"/>
      <rect x="110" y="16" width="12" height="12" rx="2" fill="none" stroke="#d1d5db" stroke-width="1"/>
    </g>
    <g transform="translate(15,182)">
      <rect width="130" height="45" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="10" y="10" width="24" height="24" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width=".5"/>
      <rect x="42" y="12" width="70" height="6" rx="2" fill="#e2e8f0"/>
      <rect x="42" y="24" width="45" height="4" rx="2" fill="#f1f5f9"/>
      <rect x="110" y="16" width="12" height="12" rx="2" fill="none" stroke="#d1d5db" stroke-width="1"/>
    </g>
    <g transform="translate(15,234)">
      <rect width="130" height="45" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="10" y="10" width="24" height="24" rx="6" fill="#fdf2f8" stroke="#fbcfe8" stroke-width=".5"/>
      <rect x="42" y="12" width="70" height="6" rx="2" fill="#e2e8f0"/>
      <rect x="42" y="24" width="45" height="4" rx="2" fill="#f1f5f9"/>
      <rect x="110" y="16" width="12" height="12" rx="2" fill="none" stroke="#d1d5db" stroke-width="1"/>
    </g>
    <!-- Bottom nav -->
    <rect x="0" y="290" width="160" height="30" rx="0" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="32" cy="305" r="4" fill="#e2e8f0"/><circle cx="64" cy="305" r="4" fill="#e2e8f0"/>
    <circle cx="96" cy="305" r="4" fill="#e2e8f0"/><circle cx="128" cy="305" r="4" fill="#94a3b8"/>
  </g>

  <!-- Flow arrows -->
  <g stroke="#6366f1" fill="#6366f1" opacity=".3">
    <line x1="205" y1="250" x2="250" y2="250" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="248,246 256,250 248,254"/>
    <line x1="425" y1="250" x2="470" y2="250" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="468,246 476,250 468,254"/>
  </g>

  <!-- Annotation -->
  <g transform="translate(40,440)">
    <rect width="260" height="120" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="15" y="22" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#334155">Accessibility Notes</text>
    <g fill="#64748b" font-family="system-ui,sans-serif" font-size="8">
      <text x="15" y="42">✓ Minimum touch target: 44×44pt</text>
      <text x="15" y="56">✓ Color contrast ratio ≥ 7:1 (AAA)</text>
      <text x="15" y="70">✓ Screen reader compatible (ARIA)</text>
      <text x="15" y="84">✓ Dynamic font scaling support</text>
      <text x="15" y="98">✓ Reduced motion preference</text>
    </g>
  </g>
  <g transform="translate(340,440)">
    <rect width="260" height="120" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="15" y="22" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#334155">Spacing System</text>
    <g transform="translate(15,35)">
      <rect width="8" height="8" rx="1" fill="#c4b5fd"/><text x="14" y="7" font-family="monospace" font-size="7" fill="#64748b">4px — micro</text>
      <rect y="14" width="16" height="8" rx="1" fill="#a78bfa"/><text x="22" y="21" font-family="monospace" font-size="7" fill="#64748b">8px — xs</text>
      <rect y="28" width="32" height="8" rx="1" fill="#8b5cf6"/><text x="38" y="35" font-family="monospace" font-size="7" fill="#64748b">16px — sm</text>
      <rect y="42" width="48" height="8" rx="1" fill="#7c3aed"/><text x="54" y="49" font-family="monospace" font-size="7" fill="#64748b">24px — md</text>
      <rect y="56" width="64" height="8" rx="1" fill="#6d28d9"/><text x="70" y="63" font-family="monospace" font-size="7" fill="#64748b">32px — lg</text>
      <rect y="70" width="80" height="8" rx="1" fill="#5b21b6"/><text x="86" y="77" font-family="monospace" font-size="7" fill="#64748b">40px — xl</text>
    </g>
  </g>
</svg>
