<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <rect width="100%" height="100%" fill="#f7fff7"/>
  <g transform="translate(40,30)">
    <text x="0" y="24" font-family="Inter, Arial" font-size="20" fill="#064e3b">Photo produit — visuel cohérent</text>
    <!-- Stylized fruit group -->
    <g transform="translate(0,40)">
      <ellipse cx="220" cy="130" rx="160" ry="110" fill="#fff6f0" stroke="#ffe9d5"/>
      <!-- Apple -->
      <g transform="translate(120,60)">
        <circle cx="0" cy="0" r="50" fill="#ff6b6b" stroke="#d24b4b"/>
        <path d="M-10 -50 C -8 -70, 8 -70, 10 -50 C 8 -48, -8 -48, -10 -50 Z" fill="#3b3b3b" opacity="0.9"/>
        <rect x="-6" y="-68" width="12" height="18" rx="3" fill="#6b4226"/>
      </g>
      <!-- Lemon -->
      <g transform="translate(260,120)">
        <ellipse cx="0" cy="0" rx="38" ry="28" fill="#ffd166" stroke="#f5b800"/>
      </g>
      <!-- Strawberry -->
      <g transform="translate(340,70)">
        <path d="M0 50 C25 50,45 10,0 -20 C-45 10,-25 50,0 50 Z" fill="#ff4d6d" stroke="#d63b52"/>
        <rect x="-6" y="-22" width="12" height="8" rx="2" fill="#4caf50"/>
      </g>
    </g>
  </g>
</svg>
