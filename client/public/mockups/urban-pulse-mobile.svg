<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800">
  <defs>
    <linearGradient id="mg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e1b4b"/></linearGradient>
    <linearGradient id="mb" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#6366f1"/></linearGradient>
    <linearGradient id="mc" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#06b6d4" stop-opacity=".1"/><stop offset="100%" stop-color="#06b6d4" stop-opacity=".6"/></linearGradient>
    <clipPath id="screen"><rect x="16" y="16" width="368" height="768" rx="32"/></clipPath>
  </defs>
  <!-- Background (phone bezel) -->
  <rect width="400" height="800" rx="40" fill="#111827"/>
  <!-- Screen -->
  <g clip-path="url(#screen)">
    <rect x="16" y="16" width="368" height="768" fill="url(#mg)"/>
    <!-- Status bar -->
    <text x="36" y="42" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="white">9:41</text>
    <g transform="translate(310,32)" fill="white" opacity=".6">
      <rect width="20" height="10" rx="2" fill="none" stroke="white" stroke-width="1"/><rect x="2" y="2" width="12" height="6" rx="1" fill="white"/>
      <rect x="20" y="3" width="2" height="4" rx="1" fill="white"/>
    </g>
    <!-- Header -->
    <g transform="translate(30,60)">
      <rect width="32" height="32" rx="8" fill="url(#mb)"/>
      <rect x="8" y="12" width="4" height="12" rx="1" fill="white"/><rect x="14" y="8" width="4" height="16" rx="1" fill="white"/><rect x="20" y="5" width="4" height="19" rx="1" fill="white"/>
      <text x="42" y="16" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="white">Urban Pulse</text>
      <text x="42" y="30" font-family="system-ui,sans-serif" font-size="9" fill="#475569">Tableau de bord citoyen</text>
    </g>
    <!-- Live badge -->
    <rect x="290" y="66" width="54" height="22" rx="11" fill="#06b6d4" fill-opacity=".15"/>
    <circle cx="304" cy="77" r="3" fill="#06b6d4"/>
    <text x="314" y="81" font-family="system-ui,sans-serif" font-size="9" fill="#06b6d4" font-weight="600">Live</text>

    <!-- Search -->
    <rect x="30" y="106" width="340" height="38" rx="10" fill="#1e293b" stroke="#334155" stroke-width=".5"/>
    <text x="50" y="130" font-family="system-ui,sans-serif" font-size="12" fill="#475569">Rechercher un service...</text>

    <!-- Cityscape mini -->
    <g transform="translate(30,156)">
      <rect width="340" height="110" rx="10" fill="#0c1222" stroke="#1e293b" stroke-width=".5" overflow="hidden"/>
      <!-- Buildings -->
      <rect x="15" y="50" width="22" height="60" rx="2" fill="#06b6d4" fill-opacity=".15"/>
      <rect x="42" y="30" width="30" height="80" rx="2" fill="#6366f1" fill-opacity=".2"/>
      <rect x="78" y="45" width="20" height="65" rx="2" fill="#8b5cf6" fill-opacity=".15"/>
      <rect x="104" y="20" width="35" height="90" rx="2" fill="#0ea5e9" fill-opacity=".2"/>
      <rect x="145" y="40" width="25" height="70" rx="2" fill="#06b6d4" fill-opacity=".15"/>
      <rect x="176" y="25" width="32" height="85" rx="2" fill="#6366f1" fill-opacity=".2"/>
      <rect x="214" y="50" width="22" height="60" rx="2" fill="#8b5cf6" fill-opacity=".15"/>
      <rect x="242" y="35" width="28" height="75" rx="2" fill="#10b981" fill-opacity=".15"/>
      <rect x="276" y="45" width="24" height="65" rx="2" fill="#0ea5e9" fill-opacity=".15"/>
      <rect x="306" y="30" width="20" height="80" rx="2" fill="#6366f1" fill-opacity=".15"/>
      <!-- Gradient overlay -->
      <rect width="340" height="110" rx="10" fill="url(#mg)" fill-opacity=".4"/>
      <!-- Pulse dots -->
      <circle cx="80" cy="55" r="4" fill="none" stroke="#06b6d4" stroke-width=".7" opacity=".5"/>
      <circle cx="180" cy="45" r="4" fill="none" stroke="#8b5cf6" stroke-width=".7" opacity=".5"/>
      <circle cx="260" cy="60" r="4" fill="none" stroke="#10b981" stroke-width=".7" opacity=".5"/>
      <!-- Text overlay -->
      <text x="15" y="100" font-family="system-ui,sans-serif" font-size="9" fill="white" opacity=".4">Bornes • Services • Événements</text>
    </g>

    <!-- Stat cards 2x2 -->
    <g transform="translate(30,280)">
      <!-- Metro -->
      <rect width="164" height="80" rx="10" fill="#0f1729" stroke="#1e293b" stroke-width=".5"/>
      <rect x="12" y="12" width="28" height="28" rx="6" fill="#10b981" fill-opacity=".15"/>
      <text x="26" y="30" font-family="system-ui,sans-serif" font-size="10" fill="#10b981" text-anchor="middle">🚇</text>
      <text x="48" y="24" font-family="system-ui,sans-serif" font-size="9" fill="#475569">Métro</text>
      <text x="48" y="38" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#10b981">À l'heure</text>
      <text x="12" y="66" font-family="system-ui,sans-serif" font-size="8" fill="#334155">Lignes: 14</text>
      <!-- Bikes -->
      <g transform="translate(176,0)">
        <rect width="164" height="80" rx="10" fill="#0f1729" stroke="#1e293b" stroke-width=".5"/>
        <rect x="12" y="12" width="28" height="28" rx="6" fill="#06b6d4" fill-opacity=".15"/>
        <text x="26" y="30" font-family="system-ui,sans-serif" font-size="10" fill="#06b6d4" text-anchor="middle">🚲</text>
        <text x="48" y="24" font-family="system-ui,sans-serif" font-size="9" fill="#475569">Vélos</text>
        <text x="48" y="38" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#06b6d4">847</text>
        <text x="12" y="66" font-family="system-ui,sans-serif" font-size="8" fill="#334155">Stations: 320</text>
      </g>
      <!-- Air -->
      <g transform="translate(0,90)">
        <rect width="164" height="80" rx="10" fill="#0f1729" stroke="#1e293b" stroke-width=".5"/>
        <rect x="12" y="12" width="28" height="28" rx="6" fill="#10b981" fill-opacity=".15"/>
        <text x="26" y="30" font-family="system-ui,sans-serif" font-size="10" fill="#10b981" text-anchor="middle">💨</text>
        <text x="48" y="24" font-family="system-ui,sans-serif" font-size="9" fill="#475569">Air</text>
        <text x="48" y="38" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#10b981">Bon</text>
        <text x="12" y="66" font-family="system-ui,sans-serif" font-size="8" fill="#334155">AQI: 72</text>
      </g>
      <!-- Temp -->
      <g transform="translate(176,90)">
        <rect width="164" height="80" rx="10" fill="#0f1729" stroke="#1e293b" stroke-width=".5"/>
        <rect x="12" y="12" width="28" height="28" rx="6" fill="#f59e0b" fill-opacity=".15"/>
        <text x="26" y="30" font-family="system-ui,sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle">🌡</text>
        <text x="48" y="24" font-family="system-ui,sans-serif" font-size="9" fill="#475569">Temp</text>
        <text x="48" y="38" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#f59e0b">22°C</text>
        <text x="12" y="66" font-family="system-ui,sans-serif" font-size="8" fill="#334155">Vent: 12 km/h</text>
      </g>
    </g>

    <!-- Energy mini chart -->
    <g transform="translate(30,466)">
      <rect width="340" height="90" rx="10" fill="#0f1729" stroke="#1e293b" stroke-width=".5"/>
      <text x="12" y="22" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="white">⚡ Énergie</text>
      <text x="322" y="22" font-family="system-ui,sans-serif" font-size="9" fill="#475569" text-anchor="end">kWh</text>
      <!-- Mini bars -->
      <g transform="translate(12,34)">
        <rect x="0" y="30" width="20" height="22" rx="2" fill="url(#mc)"/><rect x="26" y="20" width="20" height="32" rx="2" fill="url(#mc)"/>
        <rect x="52" y="10" width="20" height="42" rx="2" fill="url(#mc)"/><rect x="78" y="25" width="20" height="27" rx="2" fill="url(#mc)"/>
        <rect x="104" y="5" width="20" height="47" rx="2" fill="url(#mc)"/><rect x="130" y="18" width="20" height="34" rx="2" fill="url(#mc)"/>
        <rect x="156" y="12" width="20" height="40" rx="2" fill="url(#mc)"/><rect x="182" y="22" width="20" height="30" rx="2" fill="url(#mc)"/>
        <rect x="208" y="8" width="20" height="44" rx="2" fill="url(#mc)"/><rect x="234" y="15" width="20" height="37" rx="2" fill="url(#mc)"/>
        <rect x="260" y="3" width="20" height="49" rx="2" fill="url(#mc)"/><rect x="286" y="20" width="20" height="32" rx="2" fill="url(#mc)"/>
      </g>
    </g>

    <!-- Transport list -->
    <g transform="translate(30,568)">
      <rect width="340" height="120" rx="10" fill="#0f1729" stroke="#1e293b" stroke-width=".5"/>
      <text x="12" y="22" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="white">🚌 Transport</text>
      <g transform="translate(12,34)" font-family="system-ui,sans-serif" font-size="10">
        <circle cx="5" cy="6" r="3" fill="#06b6d4"/><text x="14" y="10" fill="#cbd5e1">L1 — Centre ↔ Aéroport</text>
        <rect x="240" y="1" width="80" height="6" rx="3" fill="#1e293b"/><rect x="240" y="1" width="70" height="6" rx="3" fill="#06b6d4" fill-opacity=".5"/>
        <circle cx="5" cy="30" r="3" fill="#6366f1"/><text x="14" y="34" fill="#cbd5e1">L2 — Nord ↔ Sud</text>
        <rect x="240" y="25" width="80" height="6" rx="3" fill="#1e293b"/><rect x="240" y="25" width="50" height="6" rx="3" fill="#6366f1" fill-opacity=".5"/>
        <circle cx="5" cy="54" r="3" fill="#10b981"/><text x="14" y="58" fill="#cbd5e1">L3 — Est ↔ Université</text>
        <rect x="240" y="49" width="80" height="6" rx="3" fill="#1e293b"/><rect x="240" y="49" width="76" height="6" rx="3" fill="#10b981" fill-opacity=".5"/>
      </g>
    </g>

    <!-- Bottom nav -->
    <rect x="16" y="710" width="368" height="74" fill="#0c1222"/>
    <g transform="translate(56,726)" font-family="system-ui,sans-serif" font-size="8">
      <circle cx="0" cy="0" r="10" fill="#06b6d4" fill-opacity=".1"/><circle cx="0" cy="0" r="3" fill="#06b6d4"/><text x="0" y="20" fill="#06b6d4" text-anchor="middle" font-weight="600">Accueil</text>
      <circle cx="80" cy="0" r="3" fill="#334155"/><text x="80" y="20" fill="#475569" text-anchor="middle">Transport</text>
      <circle cx="160" cy="0" r="3" fill="#334155"/><text x="160" y="20" fill="#475569" text-anchor="middle">Services</text>
      <circle cx="240" cy="0" r="3" fill="#334155"/><text x="240" y="20" fill="#475569" text-anchor="middle">Alertes</text>
    </g>
    <!-- Home indicator -->
    <rect x="150" y="774" width="100" height="4" rx="2" fill="white" opacity=".15"/>
  </g>
  <!-- Notch -->
  <rect x="130" y="16" width="140" height="26" rx="13" fill="#111827"/>
</svg>
