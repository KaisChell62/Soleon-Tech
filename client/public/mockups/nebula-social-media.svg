<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="nebulaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="nebulaGradV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#D946EF"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#0a0a0f"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#8B5CF6" letter-spacing="4">SOCIAL MEDIA TEMPLATES</text>
  
  <!-- Instagram Post -->
  <rect x="40" y="50" width="200" height="200" rx="4" fill="#12121a"/>
  <rect x="40" y="50" width="200" height="200" rx="4" fill="url(#nebulaGrad)" opacity="0.15"/>
  
  <!-- Big logo -->
  <circle cx="140" cy="120" r="35" fill="url(#nebulaGrad)"/>
  <path d="M 120 120 L 140 95 L 160 120 L 140 108 Z" fill="#fff"/>
  
  <text x="140" y="175" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#fff">NEBULA AI</text>
  <text x="140" y="195" text-anchor="middle" font-family="Arial" font-size="9" fill="#888">ETHICAL INTELLIGENCE</text>
  <text x="140" y="235" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Instagram Post • 1080×1080</text>
  
  <!-- Instagram Story -->
  <rect x="260" y="50" width="112" height="200" rx="8" fill="#12121a"/>
  <rect x="260" y="50" width="112" height="200" rx="8" fill="url(#nebulaGradV)" opacity="0.2"/>
  
  <!-- Story content -->
  <circle cx="316" cy="90" r="20" fill="url(#nebulaGrad)"/>
  <path d="M 306 90 L 316 75 L 326 90 L 316 82 Z" fill="#fff"/>
  
  <text x="316" y="125" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">NEW</text>
  <text x="316" y="140" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">FEATURE</text>
  
  <rect x="275" y="155" width="82" height="25" rx="12" fill="url(#nebulaGrad)"/>
  <text x="316" y="171" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#fff">Learn More</text>
  
  <!-- Swipe up icon -->
  <path d="M 316 200 L 310 210 L 316 207 L 322 210 Z" fill="#fff" opacity="0.6"/>
  <text x="316" y="220" text-anchor="middle" font-family="Arial" font-size="7" fill="#888">Swipe Up</text>
  
  <text x="316" y="265" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Story • 1080×1920</text>
  
  <!-- Twitter/X Post -->
  <rect x="395" y="50" width="360" height="120" rx="8" fill="#12121a"/>
  
  <!-- Profile pic -->
  <circle cx="430" cy="85" r="20" fill="url(#nebulaGrad)"/>
  <path d="M 422 85 L 430 72 L 438 85 L 430 78 Z" fill="#fff"/>
  
  <text x="460" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">Nebula AI</text>
  <text x="538" y="75" font-family="Arial" font-size="10" fill="#666">@nebula_ai</text>
  <text x="610" y="75" font-family="Arial" font-size="10" fill="#555">• 2h</text>
  
  <text x="460" y="95" font-family="Arial" font-size="11" fill="#ccc">Introducing our new AI model that puts ethics first. 🚀</text>
  <text x="460" y="112" font-family="Arial" font-size="11" fill="#ccc">Built with transparency and responsibility at its core.</text>
  <text x="460" y="129" font-family="Arial" font-size="11" fill="#8B5CF6">#AI #Ethics #Innovation</text>
  
  <!-- Tweet actions -->
  <text x="420" y="155" font-family="Arial" font-size="10" fill="#555">💬 234</text>
  <text x="480" y="155" font-family="Arial" font-size="10" fill="#555">🔄 1.2K</text>
  <text x="540" y="155" font-family="Arial" font-size="10" fill="#555">❤️ 5.8K</text>
  <text x="600" y="155" font-family="Arial" font-size="10" fill="#555">📊 45K</text>
  
  <text x="575" y="180" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">X/Twitter Post</text>
  
  <!-- LinkedIn Banner -->
