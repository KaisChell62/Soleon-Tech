  <path d="M 265 320 L 280 300 L 295 320 L 280 310 Z" fill="#fff"/>
  
  <!-- Profile photo overlap -->
  <circle cx="90" cy="360" r="30" fill="#1a1a24" stroke="#0a0a0f" stroke-width="3"/>
  <circle cx="90" cy="360" r="25" fill="url(#nebulaGrad)"/>
  <path d="M 78 360 L 90 343 L 102 360 L 90 352 Z" fill="#fff"/>
  
  <text x="135" y="370" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">Nebula AI</text>
  <text x="135" y="385" font-family="Arial" font-size="9" fill="#888">Ethical AI Solutions | 10K followers</text>
  
  <text x="280" y="420" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">LinkedIn Banner • 1584×396</text>
  
  <!-- YouTube Thumbnail -->
  <rect x="560" y="280" width="200" height="112" rx="4" fill="#12121a"/>
  <rect x="560" y="280" width="200" height="112" rx="4" fill="url(#nebulaGrad)" opacity="0.2"/>
  
  <!-- Thumbnail content -->
  <circle cx="660" cy="320" r="25" fill="url(#nebulaGrad)"/>
  <path d="M 648 320 L 660 300 L 672 320 L 660 310 Z" fill="#fff"/>
  
  <text x="660" y="360" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">AI That Cares</text>
  <text x="660" y="378" text-anchor="middle" font-family="Arial" font-size="9" fill="#06B6D4">FULL DOCUMENTARY</text>
  
  <!-- Play button -->
