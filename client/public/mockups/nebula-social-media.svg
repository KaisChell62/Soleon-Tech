  <path d="M 654 312 L 654 328 L 670 320 Z" fill="#fff"/>
  
  <!-- Duration badge -->
  <rect x="725" y="370" width="28" height="14" rx="2" fill="rgba(0,0,0,0.8)"/>
  <text x="739" y="380" text-anchor="middle" font-family="Arial" font-size="8" fill="#fff">15:42</text>
  
  <text x="660" y="420" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">YouTube Thumbnail • 1280×720</text>
  
  <!-- Email Signature -->
  <rect x="40" y="440" width="300" height="50" rx="4" fill="#ffffff"/>
  <rect x="55" y="450" width="30" height="30" rx="4" fill="url(#nebulaGrad)"/>
  <path d="M 62 465 L 70 455 L 78 465 L 70 460 Z" fill="#fff"/>
  
  <text x="95" y="462" font-family="Arial" font-size="10" font-weight="bold" fill="#0a0a0f">Alex Chen</text>
  <text x="95" y="475" font-family="Arial" font-size="8" fill="#555">Product Designer | Nebula AI</text>
  <text x="200" y="462" font-family="Arial" font-size="8" fill="#8B5CF6">alex@nebula-ai.com</text>
  <text x="200" y="475" font-family="Arial" font-size="8" fill="#888">+1 (555) 123-4567</text>
  
  <text x="190" y="495" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Email Signature</text>
  
  <!-- Favicon -->
  <rect x="380" y="440" width="100" height="50" rx="4" fill="#1a1a24"/>
  <rect x="410" y="450" width="24" height="24" rx="4" fill="url(#nebulaGrad)"/>
  <path d="M 416 462 L 422 454 L 428 462 L 422 458 Z" fill="#fff"/>
  <rect x="440" y="455" width="12" height="12" rx="2" fill="url(#nebulaGrad)"/>
  <path d="M 443 461 L 446 457 L 449 461 L 446 459 Z" fill="#fff"/>
  
  <text x="430" y="495" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Favicon Sizes</text>
  
  <!-- App Icon -->
  <rect x="520" y="440" width="100" height="50" rx="4" fill="#1a1a24"/>
  <rect x="550" y="447" width="36" height="36" rx="8" fill="url(#nebulaGrad)"/>
  <path d="M 559 465 L 568 450 L 577 465 L 568 458 Z" fill="#fff"/>
  
  <text x="570" y="495" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">App Icon</text>
  
  <!-- Footer -->
  <text x="700" y="485" font-family="Arial" font-size="9" fill="#444">Nebula AI • Brand Guidelines v1.0</text>
