  <rect x="40" y="280" width="480" height="80" rx="4" fill="url(#nebulaGrad)" opacity="0.3"/>
  
  <!-- Abstract pattern on banner -->
  <circle cx="80" cy="310" r="30" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="150" cy="340" r="45" fill="#06B6D4" opacity="0.15"/>
  <circle cx="440" cy="300" r="35" fill="#D946EF" opacity="0.15"/>
  <circle cx="380" cy="350" r="25" fill="#8B5CF6" opacity="0.1"/>
  
  <!-- Logo on banner -->
