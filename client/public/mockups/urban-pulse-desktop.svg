      <text x="276" y="160" font-family="system-ui,sans-serif" font-size="10" fill="white" text-anchor="end" font-weight="600">68%</text>
      <rect x="20" y="166" width="272" height="6" rx="3" fill="#1e293b"/><rect x="20" y="166" width="185" height="6" rx="3" fill="url(#btn)" fill-opacity=".7"/>
