      <text x="85" y="40" font-family="system-ui,sans-serif" font-size="18" fill="white" text-anchor="middle" opacity=".15">🏛</text>
      <text x="12" y="62" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="white">Kiosk Mairie</text>
      <text x="12" y="76" font-family="system-ui,sans-serif" font-size="9" fill="#475569">Quartier: Admin</text>
