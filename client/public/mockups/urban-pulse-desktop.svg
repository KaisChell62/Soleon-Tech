    <text x="0" y="40" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="white">1.2M</text>
    <text x="0" y="64" font-family="system-ui,sans-serif" font-size="9" fill="#475569">Satisfaction</text>
    <text x="0" y="80" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#10b981">94%</text>
    <text x="0" y="104" font-family="system-ui,sans-serif" font-size="9" fill="#475569">Signalements résolus</text>
    <text x="0" y="120" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="white">2,847</text>
