    <rect x="8" y="14" width="5" height="14" rx="1.5" fill="white"/><rect x="15" y="10" width="5" height="18" rx="1.5" fill="white"/><rect x="22" y="6" width="5" height="22" rx="1.5" fill="white"/>
  </g>
  <text x="72" y="42" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="white">Urban Pulse</text>
  <text x="72" y="56" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Tableau de bord citoyen</text>
  <!-- Nav items -->
