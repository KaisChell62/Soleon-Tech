    <text x="48" y="114" fill="#06b6d4" font-weight="600">Vue d'ensemble</text>
    <circle cx="30" cy="109" r="3" fill="#06b6d4"/>
    <text x="48" y="150" fill="#475569">Transport</text><circle cx="30" cy="145" r="3" fill="#334155"/>
    <text x="48" y="182" fill="#475569">Énergie</text><circle cx="30" cy="177" r="3" fill="#334155"/>
    <text x="48" y="214" fill="#475569">Espaces verts</text><circle cx="30" cy="209" r="3" fill="#334155"/>
    <text x="48" y="246" fill="#475569">Services</text><circle cx="30" cy="241" r="3" fill="#334155"/>
    <text x="48" y="278" fill="#475569">Alertes</text><circle cx="30" cy="273" r="3" fill="#334155"/>
  </g>
  <!-- Sidebar bottom stats -->
