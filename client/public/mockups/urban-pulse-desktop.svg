        <rect x="200" y="34" width="72" height="18" rx="9" fill="#10b981" fill-opacity=".1"/><text x="236" y="46" font-size="9" fill="#10b981" text-anchor="middle" font-weight="600">Ouvert</text>
        <text x="0" y="74" fill="#cbd5e1">Promenade Rivière</text>
        <rect x="200" y="66" width="72" height="18" rx="9" fill="#10b981" fill-opacity=".1"/><text x="236" y="78" font-size="9" fill="#10b981" text-anchor="middle" font-weight="600">Ouvert</text>
      </g>
