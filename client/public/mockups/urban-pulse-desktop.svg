      <text x="12" y="62" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="white">Kiosk Gare</text>
      <text x="12" y="76" font-family="system-ui,sans-serif" font-size="9" fill="#475569">Quartier: Centre</text>
