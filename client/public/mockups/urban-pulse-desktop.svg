    <g transform="translate(24,24)" fill="none" stroke="#10b981" stroke-width="1.5"><rect width="20" height="14" rx="3"/><line x1="4" y1="18" x2="4" y2="20"/><line x1="16" y1="18" x2="16" y2="20"/></g>
    <text x="64" y="32" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Métro</text>
    <text x="64" y="48" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#10b981">À l'heure</text>
    <text x="16" y="84" font-family="system-ui,sans-serif" font-size="10" fill="#334155">Lignes actives: 14</text>
