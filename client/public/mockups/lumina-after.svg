<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="600" fill="#05060a"/>
  <defs>
    <linearGradient id="accent" x1="0" x2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient>
  </defs>
  <g transform="translate(40,40)">
    <text x="0" y="28" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">APRÈS — Système Lumina</text>
    <text x="0" y="72" font-family="Inter, system-ui, sans-serif" font-size="36" fill="#fff" font-weight="700">Cadres liquides · Typo cohérente · Navigation immersive</text>

    <g transform="translate(0,120)">
      <rect x="0" y="0" width="520" height="340" rx="12" fill="#071026" stroke="#111827"/>
      <text x="24" y="28" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#cbd5e1">Virtual Hall — unified frames adapt to artwork hue</text>
      <!-- Three unified frames -->
      <g transform="translate(24,56)">
        <rect x="0" y="0" width="150" height="200" rx="8" fill="#0b1220" stroke="url(#accent)" stroke-width="2"/>
        <rect x="170" y="0" width="150" height="200" rx="8" fill="#0b1220" stroke="url(#accent)" stroke-width="2"/>
        <rect x="340" y="0" width="150" height="200" rx="8" fill="#0b1220" stroke="url(#accent)" stroke-width="2"/>
      </g>
      <text x="24" y="280" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">Résultat : expérience cohérente, images optimisées</text>
    </g>
  </g>
</svg>
