<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <rect width="100%" height="100%" fill="#f8fafc" />
  <text x="48" y="56" font-family="Inter, Arial" font-size="28" fill="#064e3b">Wireframe Desktop — EcoMarket</text>
  <g transform="translate(48,96)">
    <rect width="1104" height="560" rx="20" fill="#ffffff" stroke="#e6e6e6" />
