        <text x="120" y="56" font-size="16" fill="#064e3b">Avocat Bio</text>
        <text x="120" y="84" font-size="14" fill="#6b7280">2.49€ • 250g</text>
        <rect x="0" y="184" width="240" height="36" rx="18" fill="#10b981" />
        <text x="16" y="208" font-size="14" fill="#fff">Ajouter</text>
