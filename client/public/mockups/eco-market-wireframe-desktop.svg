        <text x="400" y="84" font-size="14" fill="#6b7280">4.99€ • 250g</text>
        <rect x="280" y="184" width="240" height="36" rx="18" fill="#10b981" />
        <text x="296" y="208" font-size="14" fill="#fff">Ajouter</text>
        <!-- card 3 -->
        <rect x="560" y="0" width="240" height="160" rx="14" fill="#ffffff" stroke="#eef2f7" />
