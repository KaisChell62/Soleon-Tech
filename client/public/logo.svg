<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Clean, Modern Background -->
  <rect x="0" y="0" width="100" height="100" rx="24" fill="#0A0A0B"/>
  
  <!-- Stylized Monogram or Symbol for 'Soleon Tech' -->
  <!-- Abstract UP arrow / Growth symbol integrated with 'G' -->
  <path d="M35 70V30L75 50L35 70Z" fill="url(#gradient)" />
  <circle cx="50" cy="50" r="42" stroke="url(#gradient-stroke)" stroke-width="6" fill="none"/>

  <defs>
    <linearGradient id="gradient" x1="35" y1="30" x2="75" y2="70" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/> <!-- Indigo-500 -->
      <stop offset="1" stop-color="#a855f7"/> <!-- Purple-500 -->
    </linearGradient>
    <linearGradient id="gradient-stroke" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
</svg>